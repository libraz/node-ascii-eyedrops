<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ascii-eyedrops demo</title>
<style>
	*,
	*::before,
	*::after {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}

	:root {
		--bg: #0d1117;
		--surface: #161b22;
		--border: #30363d;
		--text: #e6edf3;
		--text-muted: #8b949e;
		--accent: #58a6ff;
		--accent-hover: #79c0ff;
		--success: #3fb950;
		--error: #f85149;
		--font-mono: "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono",
			monospace;
	}

	body {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
			sans-serif;
		background: var(--bg);
		color: var(--text);
		min-height: 100vh;
		line-height: 1.5;
	}

	header {
		border-bottom: 1px solid var(--border);
		padding: 16px 24px;
		display: flex;
		align-items: center;
		gap: 12px;
	}

	header h1 {
		font-size: 18px;
		font-weight: 600;
	}

	header h1 span {
		color: var(--text-muted);
		font-weight: 400;
	}

	.container {
		max-width: 1400px;
		margin: 0 auto;
		padding: 24px;
		display: grid;
		grid-template-columns: 340px 1fr;
		gap: 24px;
		height: calc(100vh - 65px);
	}

	.panel {
		background: var(--surface);
		border: 1px solid var(--border);
		border-radius: 8px;
		overflow: hidden;
	}

	.panel-header {
		padding: 12px 16px;
		border-bottom: 1px solid var(--border);
		font-size: 13px;
		font-weight: 600;
		color: var(--text-muted);
		text-transform: uppercase;
		letter-spacing: 0.5px;
	}

	.panel-body {
		padding: 16px;
	}

	/* Sidebar */
	.sidebar {
		display: flex;
		flex-direction: column;
		gap: 16px;
		overflow-y: auto;
	}

	.field {
		display: flex;
		flex-direction: column;
		gap: 6px;
	}

	.field label {
		font-size: 13px;
		font-weight: 500;
		color: var(--text-muted);
	}

	.field input[type="number"],
	.field select {
		background: var(--bg);
		border: 1px solid var(--border);
		border-radius: 6px;
		padding: 8px 10px;
		color: var(--text);
		font-size: 14px;
		font-family: var(--font-mono);
		outline: none;
		transition: border-color 0.15s;
	}

	.field input:focus,
	.field select:focus {
		border-color: var(--accent);
	}

	.field-row {
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap: 12px;
	}

	.checkbox-field {
		display: flex;
		align-items: center;
		gap: 8px;
	}

	.checkbox-field input[type="checkbox"] {
		accent-color: var(--accent);
		width: 16px;
		height: 16px;
	}

	.checkbox-field label {
		font-size: 13px;
		color: var(--text);
		cursor: pointer;
	}

	/* Image upload */
	.image-upload {
		border: 2px dashed var(--border);
		border-radius: 8px;
		padding: 24px 16px;
		text-align: center;
		cursor: pointer;
		transition: border-color 0.15s, background 0.15s;
		position: relative;
	}

	.image-upload:hover,
	.image-upload.dragover {
		border-color: var(--accent);
		background: rgba(88, 166, 255, 0.04);
	}

	.image-upload.has-image {
		padding: 8px;
	}

	.image-upload img {
		max-width: 100%;
		max-height: 140px;
		border-radius: 4px;
	}

	.image-upload p {
		font-size: 13px;
		color: var(--text-muted);
	}

	.image-upload input {
		display: none;
	}

	/* Code input */
	.code-input {
		background: var(--bg);
		border: 1px solid var(--border);
		border-radius: 6px;
		padding: 12px;
		color: var(--text);
		font-family: var(--font-mono);
		font-size: 13px;
		resize: vertical;
		min-height: 100px;
		width: 100%;
		outline: none;
		tab-size: 2;
		line-height: 1.6;
		transition: border-color 0.15s;
	}

	.code-input:focus {
		border-color: var(--accent);
	}

	/* Buttons */
	.btn {
		padding: 10px 20px;
		border: none;
		border-radius: 6px;
		font-size: 14px;
		font-weight: 600;
		cursor: pointer;
		transition: background 0.15s, opacity 0.15s;
	}

	.btn:disabled {
		opacity: 0.5;
		cursor: not-allowed;
	}

	.btn-primary {
		background: var(--accent);
		color: #fff;
		width: 100%;
	}

	.btn-primary:hover:not(:disabled) {
		background: var(--accent-hover);
	}

	.btn-run {
		background: var(--success);
		color: #fff;
		font-size: 12px;
		padding: 6px 14px;
	}

	.btn-run:hover:not(:disabled) {
		background: #46c258;
	}

	.btn-copy {
		background: transparent;
		border: 1px solid var(--border);
		color: var(--text-muted);
		font-size: 12px;
		padding: 6px 14px;
	}

	.btn-copy:hover {
		border-color: var(--text-muted);
		color: var(--text);
	}

	/* Output */
	.output-area {
		display: flex;
		flex-direction: column;
		min-height: 0;
	}

	.output-toolbar {
		display: flex;
		align-items: center;
		justify-content: space-between;
		padding: 8px 16px;
		border-bottom: 1px solid var(--border);
	}

	.output-toolbar .info {
		font-size: 12px;
		color: var(--text-muted);
		font-family: var(--font-mono);
	}

	.output-toolbar .actions {
		display: flex;
		gap: 8px;
	}

	.output-pre {
		flex: 1;
		overflow: auto;
		padding: 16px;
		margin: 0;
		font-family: var(--font-mono);
		font-size: 7px;
		line-height: 1.15;
		white-space: pre;
		color: var(--text);
		background: var(--bg);
		min-height: 200px;
	}

	/* Console */
	.console-output {
		border-top: 1px solid var(--border);
		max-height: 120px;
		overflow-y: auto;
		padding: 8px 16px;
		font-family: var(--font-mono);
		font-size: 12px;
		background: #0a0e13;
	}

	.console-output .log {
		color: var(--text);
		padding: 2px 0;
	}

	.console-output .error {
		color: var(--error);
		padding: 2px 0;
	}

	.console-output .success {
		color: var(--success);
		padding: 2px 0;
	}

	/* Status */
	.status {
		font-size: 12px;
		padding: 8px 0;
		min-height: 28px;
	}

	.status.processing {
		color: var(--accent);
	}

	.status.error {
		color: var(--error);
	}

	.status.success {
		color: var(--success);
	}

	/* Slider */
	.slider-field {
		display: flex;
		flex-direction: column;
		gap: 4px;
	}

	.slider-field .slider-header {
		display: flex;
		justify-content: space-between;
		align-items: center;
	}

	.slider-field label {
		font-size: 13px;
		font-weight: 500;
		color: var(--text-muted);
	}

	.slider-field .slider-value {
		font-size: 12px;
		font-family: var(--font-mono);
		color: var(--text-muted);
	}

	input[type="range"] {
		-webkit-appearance: none;
		width: 100%;
		height: 4px;
		background: var(--border);
		border-radius: 2px;
		outline: none;
	}

	input[type="range"]::-webkit-slider-thumb {
		-webkit-appearance: none;
		width: 14px;
		height: 14px;
		border-radius: 50%;
		background: var(--accent);
		cursor: pointer;
	}

	@media (max-width: 900px) {
		.container {
			grid-template-columns: 1fr;
			height: auto;
		}
	}
</style>
</head>
<body>
	<header>
		<h1>ascii-eyedrops <span>demo</span></h1>
	</header>

	<div class="container">
		<!-- Sidebar -->
		<div class="sidebar">
			<!-- Image -->
			<div class="panel">
				<div class="panel-header">Image</div>
				<div class="panel-body">
					<div class="image-upload" id="dropZone">
						<input type="file" id="imageInput" accept="image/*" />
						<p>Drop an image here or click to select</p>
					</div>
				</div>
			</div>

			<!-- Code -->
			<div class="panel">
				<div class="panel-header">JavaScript Code</div>
				<div class="panel-body">
					<textarea class="code-input" id="codeInput" spellcheck="false">console.log("Hello from ASCII art!")</textarea>
				</div>
			</div>

			<!-- Options -->
			<div class="panel">
				<div class="panel-header">Options</div>
				<div class="panel-body" style="display: flex; flex-direction: column; gap: 14px;">
					<div class="field-row">
						<div class="field">
							<label for="mode">Mode</label>
							<select id="mode">
								<option value="shaded">Shaded</option>
								<option value="binary">Binary</option>
							</select>
						</div>
						<div class="field">
							<label for="width">Width (chars)</label>
							<input type="number" id="width" value="120" min="20" max="300" step="10" />
						</div>
					</div>

					<div class="slider-field">
						<div class="slider-header">
							<label for="threshold">Threshold</label>
							<span class="slider-value" id="thresholdValue">128</span>
						</div>
						<input type="range" id="threshold" min="0" max="255" value="128" />
					</div>

					<div class="slider-field">
						<div class="slider-header">
							<label for="contrast">Contrast</label>
							<span class="slider-value" id="contrastValue">1.0</span>
						</div>
						<input type="range" id="contrast" min="0" max="200" value="100" />
					</div>

					<div class="slider-field">
						<div class="slider-header">
							<label for="brightness">Brightness</label>
							<span class="slider-value" id="brightnessValue">1.0</span>
						</div>
						<input type="range" id="brightness" min="0" max="200" value="100" />
					</div>

					<div style="display: flex; gap: 16px;">
						<div class="checkbox-field">
							<input type="checkbox" id="invert" />
							<label for="invert">Invert</label>
						</div>
						<div class="checkbox-field">
							<input type="checkbox" id="dither" />
							<label for="dither">Dither</label>
						</div>
					</div>
				</div>
			</div>

			<!-- Transform button -->
			<button type="button" class="btn btn-primary" id="transformBtn" disabled>Transform</button>
			<div class="status" id="status"></div>
		</div>

		<!-- Output -->
		<div class="panel output-area">
			<div class="panel-header">Output</div>
			<div class="output-toolbar">
				<span class="info" id="outputInfo"></span>
				<div class="actions">
					<button type="button" class="btn btn-copy" id="copyBtn" disabled>Copy</button>
					<button type="button" class="btn btn-run" id="runBtn" disabled>Run</button>
				</div>
			</div>
			<pre class="output-pre" id="output"></pre>
			<div class="console-output" id="console" style="display: none;"></div>
		</div>
	</div>

	<script type="module" src="./main.ts"></script>
</body>
</html>
